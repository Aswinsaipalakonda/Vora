<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lumière Salon Pro | Vora</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['Satoshi', 'Verdana', 'sans-serif'],
                        },
                        keyframes: {
                            shimmer: {
                                '100%': { transform: 'translateX(100%)' }
                            }
                        }
                    },
                },
            }
        </script>
        <link href="https://fonts.cdnfonts.com/css/satoshi" rel="stylesheet">
        <style>
            html,
            body {
                overflow-x: hidden;
                max-width: 100vw;
            }

            body {
                font-family: Satoshi, Verdana, sans-serif;
                background-color: #F9FAFB;
                color: #111827;
                -webkit-font-smoothing: antialiased;
            }

            /* Custom Scrollbar for white background */
            ::-webkit-scrollbar {
                width: 0px;
            }

            ::-webkit-scrollbar-track {
                background: #F9FAFB;
            }

            ::-webkit-scrollbar-thumb {
                background: #E5E7EB;
                border-radius: 10px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #D1D5DB;
            }

            /* Custom Scrollbar for Sidebar */
            .custom-scrollbar::-webkit-scrollbar {
                width: 3px;
            }

            .custom-scrollbar::-webkit-scrollbar-track {
                background: transparent;
            }

            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 10px;
            }

            /* Animations */
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }

                to {
                    opacity: 1;
                }
            }

            @keyframes zoomIn {
                from {
                    opacity: 0;
                    transform: scale(0.95);
                }

                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                    filter: blur(5px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                    filter: blur(0);
                }
            }

            @keyframes float {

                0%,
                100% {
                    transform: translateY(0);
                }

                50% {
                    transform: translateY(-10px);
                }
            }

            @keyframes breathe {

                0%,
                100% {
                    box-shadow: 0 25px 50px -12px rgba(255, 255, 255, 0.25);
                }

                50% {
                    box-shadow: 0 35px 60px -15px rgba(255, 255, 255, 0.4);
                }
            }

            @keyframes slowRotate {
                from {
                    transform: rotate(45deg);
                }

                to {
                    transform: rotate(405deg);
                }
            }

            .animate-in {
                animation-duration: 0.8s;
                animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
                animation-fill-mode: both;
            }

            .fade-in {
                animation-name: fadeIn;
            }

            .zoom-in {
                animation-name: zoomIn;
            }

            .slide-in-from-bottom-8 {
                animation-name: slideUp;
            }

            .animate-float {
                animation: float 6s ease-in-out infinite;
            }

            .animate-breathe {
                animation: breathe 4s ease-in-out infinite;
            }

            .animate-slow-rotate {
                animation: slowRotate 20s linear infinite;
            }
        </style>
        <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
        <link rel="stylesheet" href="/index.css">
    </head>

    <body>
        <div id="root"></div>
        <script type="module" src="/index.tsx"></script>
    </body>
</html>
