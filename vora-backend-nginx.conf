server {
    listen 80;
    server_name api.vora.thehps.in;
    location /static/ {
        alias /var/www/vora-backend-static/;
    }
    location /media/ {
        alias /root/vora/backend/media/;
    }
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/vora.thehps.in/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/vora.thehps.in/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
